<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1a1a2e">
  <title>Offline - Lullaby Sky Villa</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a1a2e 0%, #2d2d44 50%, #1a1a2e 100%);
      color: #faf9f7;
      padding: 1.5rem;
      padding-top: env(safe-area-inset-top, 1.5rem);
      padding-bottom: env(safe-area-inset-bottom, 1.5rem);
    }
    .container {
      text-align: center;
      max-width: 400px;
      width: 100%;
    }
    .logo {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 2rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      margin-bottom: 2rem;
      color: #faf9f7;
    }
    .icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 1.5rem;
      opacity: 0.6;
    }
    .icon svg {
      width: 100%;
      height: 100%;
    }
    h1 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 1.5rem;
      font-weight: 500;
      margin-bottom: 0.75rem;
      color: #faf9f7;
    }
    p {
      font-size: 0.9rem;
      color: rgba(250, 249, 247, 0.6);
      line-height: 1.6;
      margin-bottom: 2rem;
    }
    .divider {
      width: 60px;
      height: 2px;
      background: linear-gradient(90deg, transparent, rgba(184, 157, 107, 0.6), transparent);
      margin: 1.5rem auto;
      border-radius: 999px;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.875rem 2rem;
      border: 1px solid rgba(250, 249, 247, 0.3);
      border-radius: 999px;
      color: #faf9f7;
      text-decoration: none;
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      background: transparent;
      transition: all 0.35s cubic-bezier(0.22, 1, 0.36, 1);
      min-height: 48px;
      width: 100%;
      max-width: 220px;
    }
    .btn:hover, .btn:active {
      background: rgba(250, 249, 247, 0.1);
      border-color: rgba(250, 249, 247, 0.6);
    }
    @media (min-width: 640px) {
      .btn {
        width: auto;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">Lullaby</div>
    <div class="icon">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1">
        <path stroke-linecap="round" stroke-linejoin="round" d="M18.364 5.636a9 9 0 010 12.728m0 0l-2.829-2.829m2.829 2.829L21 21M15.536 8.464a5 5 0 010 7.072m0 0l-2.829-2.829m-4.243 2.829a5 5 0 01-1.414-3.536m1.414 3.536L4.929 17.07M12 12v.01" />
      </svg>
    </div>
    <h1>Bạn đang offline</h1>
    <p>Không thể kết nối với máy chủ. Vui lòng kiểm tra kết nối internet và thử lại.</p>
    <div class="divider"></div>
    <button class="btn" onclick="window.location.reload()">Thử lại</button>
  </div>
</body>
</html>
